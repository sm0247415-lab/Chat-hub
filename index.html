<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow Chat Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; background:#121212; color:white; margin:0; }
.container { background:#1e1e1e; padding:30px; border-radius:12px; text-align:center; width:90%; max-width:350px; box-sizing:border-box; }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:none; }
button { padding:10px 20px; background:#00bfff; border:none; border-radius:6px; color:white; cursor:pointer; }
button:hover { background:#009acd; }
#msg { color:#ff5555; font-size:13px; }
</style>
</head>
<body>
<div class="container">
<h2>Login</h2>
<input type="text" id="username" placeholder="Enter your name" />
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<script>
function login() {
    let user = document.getElementById('username').value.trim();
    if(user==="") {
        document.getElementById('msg').innerText="Please enter a name!";
        return;
    }
    localStorage.setItem('user', user);
    window.location.href="chat.html";
}
</script>
</body>
</html>
