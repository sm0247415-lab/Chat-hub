<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyChat Ultra</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {margin:0;font-family:sans-serif;background:#0f172a;color:white;}
.topbar {background:#075E54;padding:15px;text-align:center;font-size:18px;}
#chat {height:65vh;overflow-y:auto;padding:10px;}
.msg {padding:10px;margin:5px;border-radius:10px;max-width:70%;}
.me {background:#25D366;margin-left:auto;}
.other {background:#1e293b;}
.bottom {display:flex;padding:10px;background:#1e293b;}
input,select {padding:10px;border:none;border-radius:10px;margin-right:5px;}
button {padding:10px;background:#25D366;border:none;color:white;border-radius:10px;}
img {max-width:100%;border-radius:10px;}
#users {padding:5px;font-size:12px;color:#aaa;}
</style>
</head>

<body>

<div class="topbar">MyChat Ultra 🚀</div>

<div id="users">Online: ...</div>
<div id="chat"></div>

<div class="bottom">
  <input id="room" placeholder="Room (e.g. 123)">
  <input id="msg" placeholder="Message">
  <input type="file" id="img">
  <button onclick="send()">Send</button>
</div>

<script>
// 🔥 Firebase Config (APNA DALNA)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();

let name = prompt("Enter name");
let userId = "user_" + Math.floor(Math.random()*10000);

// 🟢 Online user
db.ref("online/" + userId).set(name);
db.ref("online/" + userId).onDisconnect().remove();

// show online users
db.ref("online").on("value", snap => {
  let list = [];
  snap.forEach(d => list.push(d.val()));
  document.getElementById("users").innerText = "Online: " + list.join(", ");
});

// 💬 send
function send() {
  let room = document.getElementById("room").value;
  let text = document.getElementById("msg").value;
  let file = document.getElementById("img").files[0];

  if (!room) return alert("Enter room id");

  let ref = db.ref("rooms/" + room);

  if (file) {
    let sref = storage.ref("img/" + Date.now());
    sref.put(file).then(()=>{
      sref.getDownloadURL().then(url=>{
        ref.push({name, img:url});
      });
    });
  } else if (text) {
    ref.push({name, msg:text});
  }

  document.getElementById("msg").value="";
  document.getElementById("img").value="";
}

// 📥 receive (room based)
let currentRoom = "";

setInterval(()=>{
  let room = document.getElementById("room").value;
  if(room && room !== currentRoom){
    currentRoom = room;
    document.getElementById("chat").innerHTML="";

    db.ref("rooms/" + room).off();
    db.ref("rooms/" + room).on("child_added", data=>{
      let d = data.val();

      let div = document.createElement("div");
      div.classList.add("msg");
      if(d.name === name) div.classList.add("me");
      else div.classList.add("other");

      if(d.msg) div.innerText = d.name + ": " + d.msg;

      if(d.img){
        let img = document.createElement("img");
        img.src = d.img;
        div.appendChild(img);
      }

      document.getElementById("chat").appendChild(div);
      document.getElementById("chat").scrollTop = 999999;
    });
  }
},1000);

</script>

</body>
</html>
