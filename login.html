<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login with Profile Picture</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>

<h2>Login</h2>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required><br><br>
  <input type="password" id="password" placeholder="Password" required><br><br>
  <input type="file" id="profilePic" accept="image/*"><br><br>
  <button type="submit">Login</button>
</form>

<h3>User Profile</h3>
<img id="userPhoto" src="default.png" width="100" alt="Profile Picture">
<p id="userEmail"></p>

<script>
  // 🔹 Firebase Config (Tera Ready Config)
  const firebaseConfig = {
    apiKey: "AIzaSyCLWXpSE2ZB8WTVakqp7eO3G1bLdz_P15w",
    authDomain: "mini-90221.firebaseapp.com",
    databaseURL: "https://mini-90221-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mini-90221",
    storageBucket: "mini-90221.appspot.com",
    messagingSenderId: "333962320072",
    appId: "1:333962320072:web:8f26318d530c9135b9edfd"
  };

  // 🔹 Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const loginForm = document.getElementById('loginForm');
  const userPhoto = document.getElementById('userPhoto');
  const userEmail = document.getElementById('userEmail');

  // 🔹 Login & Profile Pic Upload
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const file = document.getElementById('profilePic').files[0];

    try {
      const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
      const user = userCredential.user;

      if(file){
        const storageRef = firebase.storage().ref('profilePics/' + user.uid + '.jpg');
        await storageRef.put(file);
        const photoURL = await storageRef.getDownloadURL();
        await user.updateProfile({ photoURL });
        userPhoto.src = photoURL;
      }

      userEmail.textContent = user.email;
      if(user.photoURL) userPhoto.src = user.photoURL;
      alert('Login Successful!');
    } catch(err) {
      alert(err.message);
      console.error(err);
    }
  });

  // 🔹 Display user if already logged in
  firebase.auth().onAuthStateChanged(user => {
    if(user){
      userEmail.textContent = user.email;
      userPhoto.src = user.photoURL ? user.photoURL : 'default.png';
    }
  });
</script>

</body>
</html>
