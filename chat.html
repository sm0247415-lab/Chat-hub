<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family:sans-serif; background:#121212; color:white; margin:0; display:flex; flex-direction:column; height:100vh; }
.header { display:flex; align-items:center; padding:10px 15px; background:#1e1e1e; border-bottom:1px solid #333; }
.header img { width:35px; height:35px; border-radius:50%; margin-right:10px; }
.header span { font-size:14px; color:#bbb; }
.chat-box { flex:1; overflow-y:auto; padding:10px; background:#1e1e1e; }
.msg-left { text-align:left; margin:5px 0; }
.msg-right { text-align:right; margin:5px 0; }
.bubble { display:inline-block; padding:8px 12px; border-radius:12px; max-width:70%; word-wrap:break-word; }
.left { background:#333; color:white; border-top-left-radius:0; }
.right { background:#00bfff; color:white; border-top-right-radius:0; }
.input-area { display:flex; padding:10px; background:#1e1e1e; border-top:1px solid #333; }
.input-area input { flex:1; padding:10px; border-radius:6px; border:none; margin-right:10px; }
.input-area button { padding:10px 15px; background:#00bfff; border:none; border-radius:6px; cursor:pointer; color:white; }
.input-area button:hover { background:#009acd; }
/* Desktop fix */
@media(min-width:768px) {
    .chat-box { max-width:700px; margin:0 auto; border-radius:12px; }
    .input-area { max-width:700px; margin:0 auto; border-radius:0 0 12px 12px; }
    .header { max-width:700px; margin:0 auto; border-radius:12px 12px 0 0; }
}
</style>
</head>
<body>

<div class="header">
    <img id="profilePic" src="https://i.pravatar.cc/50" alt="Profile">
    <span id="userName">User</span>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." />
    <button onclick="sendMsg()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCLWXpSE2ZB8WTVakqp7eO3G1bLdz_P15w",
  authDomain: "mini-90221.firebaseapp.com",
  databaseURL: "https://mini-90221-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mini-90221",
  storageBucket: "mini-90221.firebasestorage.app",
  messagingSenderId: "333962320072",
  appId: "1:333962320072:web:8f26318d530c9135b9edfd"
};
firebase.initializeApp(firebaseConfig);
let db = firebase.database();

// User check
let user = localStorage.getItem('user');
if(!user) window.location.href="index.html";
document.getElementById('userName').innerText = user;

// Chat logic
let chatBox = document.getElementById('chatBox');

function renderMessage(data){
    let p = document.createElement('p');
    p.className = data.user === user ? 'msg-right' : 'msg-left';
    p.innerHTML = `<span class="bubble ${data.user===user?'right':'left'}"><b>${data.user}:</b> ${data.text}</span>`;
    chatBox.appendChild(p);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Listen Firebase messages
db.ref('messages').on('child_added', snapshot=>{
    renderMessage(snapshot.val());
});

function sendMsg(){
    let msgText = document.getElementById('msgInput').value.trim();
    if(msgText==="") return;
    db.ref('messages').push({user: user, text: msgText});
    document.getElementById('msgInput').value="";
}
</script>
</body>
  </html>
