<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  body { font-family: Arial; margin:0; padding:0; display:flex; flex-direction:column; height:100vh; }
  #chatContainer { flex:1; display:flex; flex-direction:column; max-width:500px; margin:auto; width:100%; }
  #status { padding:10px; background:#eee; text-align:center; }
  #messages { flex:1; overflow-y:auto; padding:10px; background:#f7f7f7; }
  .msg { padding:8px; margin-bottom:5px; border-radius:8px; background:#fff; position:relative; }
  .msg .deleteBtn { position:absolute; right:5px; top:5px; color:red; cursor:pointer; font-size:12px; }
  #inputContainer { display:flex; padding:10px; background:#eee; }
  #msgInput { flex:1; padding:8px; border-radius:5px; border:1px solid #ccc; }
  #sendBtn { padding:8px 12px; margin-left:5px; border:none; border-radius:5px; background:#0b93f6; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<div id="chatContainer">
  <div id="status">Loading...</div>
  <div id="messages"></div>
  <div id="inputContainer">
    <input type="text" id="msgInput" placeholder="Type a message">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCLWXpSE2ZB8WTVakqp7eO3G1bLdz_P15w",
    authDomain: "mini-90221.firebaseapp.com",
    databaseURL: "https://mini-90221-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "mini-90221",
    storageBucket: "mini-90221.appspot.com",
    messagingSenderId: "333962320072",
    appId: "1:333962320072:web:8f26318d530c9135b9edfd"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  const statusDiv = document.getElementById('status');
  const messagesDiv = document.getElementById('messages');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');

  let currentUser = null;

  // 🔹 Check login
  auth.onAuthStateChanged(user=>{
    if(!user) window.location='login.html';
    currentUser=user;
    statusDiv.textContent = user.email + ' is Online';
    db.ref('status/'+user.uid).set('online');
    db.ref('status/'+user.uid).onDisconnect().set('offline');
    loadMessages();
  });

  // 🔹 Send message
  sendBtn.addEventListener('click', ()=>{
    if(!currentUser) return;
    const text = msgInput.value.trim();
    if(!text) return;
    const msgRef = db.ref('messages').push();
    msgRef.set({text, uid:currentUser.uid, email:currentUser.email, timestamp:Date.now()});
    msgInput.value='';
  });

  // 🔹 Load messages
  function loadMessages(){
    db.ref('messages').on('value', snap=>{
      messagesDiv.innerHTML='';
      snap.forEach(child=>{
        const data = child.val();
        const div = document.createElement('div');
        div.className='msg';
        div.innerHTML = `<b>${data.email}:</b> ${data.text}`;
        if(currentUser.uid === data.uid){
          const del = document.createElement('span');
          del.className='deleteBtn';
          del.textContent='Delete';
          del.onclick=()=>db.ref('messages/'+child.key).remove();
          div.appendChild(del);
        }
        messagesDiv.appendChild(div);
      });
      messagesDiv.scrollTop=messagesDiv.scrollHeight;
    });
  }

  // 🔹 Online/offline status
  db.ref('status').on('value', snap=>{
    let list='';
    snap.forEach(child=>{
      list += child.val()==='online' ? `${child.key} Online | ` : `${child.key} Offline | `;
    });
    statusDiv.textContent = currentUser.email + ' is Online | ' + list;
  });
</script>

</body>
</html>
