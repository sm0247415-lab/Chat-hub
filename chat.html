<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family:sans-serif;
    background:#121212;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:0;
    padding:0;
}

/* Header */
.header {
    width:100%;
    max-width:500px;
    display:flex;
    align-items:center;
    background:#1e1e1e;
    padding:10px 15px;
    border-bottom:1px solid #333;
    box-sizing:border-box;
}

.header img {
    width:35px;
    height:35px;
    border-radius:50%;
    margin-right:10px;
}

.header span {
    font-size:14px;
    color:#bbb;
}

/* Chat Box */
.chat-box {
    width:100%;
    max-width:500px;
    margin-top:0;
    border:1px solid #333;
    border-radius:12px;
    padding:10px;
    height:400px;
    overflow-y:auto;
    background:#1e1e1e;
    box-sizing:border-box;
}

.msg-left { text-align:left; margin:5px 0; }
.msg-right { text-align:right; margin:5px 0; }

.bubble {
    display:inline-block;
    padding:8px 12px;
    border-radius:12px;
    max-width:70%;
    word-wrap:break-word;
}

.left { background:#333; color:white; border-top-left-radius:0; }
.right { background:#00bfff; color:white; border-top-right-radius:0; }

/* Input area */
.input-area {
    width:100%;
    max-width:500px;
    display:flex;
    padding:10px;
    box-sizing:border-box;
    background:#1e1e1e;
    border-top:1px solid #333;
}

.input-area input {
    flex:1;
    padding:10px;
    border-radius:6px;
    border:none;
    margin-right:10px;
}

.input-area button {
    padding:10px 15px;
    background:#00bfff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
}

.input-area button:hover { background:#009acd; }

/* Responsive Desktop */
@media(min-width:768px){
    body { padding-top:20px; }
    .chat-box { height:500px; }
}
</style>
</head>
<body>

<!-- Header with profile -->
<div class="header">
    <img id="profilePic" src="https://i.pravatar.cc/50" alt="Profile">
    <span id="userName">User</span>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." />
    <button onclick="sendMsg()">Send</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// 🔥 Firebase config added
const firebaseConfig = {
  apiKey: "AIzaSyCLWXpSE2ZB8WTVakqp7eO3G1bLdz_P15w",
  authDomain: "mini-90221.firebaseapp.com",
  databaseURL: "https://mini-90221-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mini-90221",
  storageBucket: "mini-90221.firebasestorage.app",
  messagingSenderId: "333962320072",
  appId: "1:333962320072:web:8f26318d530c9135b9edfd"
}; 
firebase.initializeApp(firebaseConfig);
let db = firebase.database();

// Get user
let user = localStorage.getItem('user');
if(!user) window.location.href="index.html";
document.getElementById('userName').innerText = user;

// Chat logic
let chatBox = document.getElementById('chatBox');

function renderMessage(data){
    let p = document.createElement('p');
    p.className = data.user === user ? 'msg-right' : 'msg-left';
    p.innerHTML = `<span class="bubble ${data.user===user?'right':'left'}"><b>${data.user}:</b> ${data.text}</span>`;
    chatBox.appendChild(p);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Listen for new messages
db.ref('messages').on('child_added', snapshot=>{
    renderMessage(snapshot.val());
});

function sendMsg(){
    let msgText = document.getElementById('msgInput').value.trim();
    if(msgText==="") return;
    db.ref('messages').push({user: user, text: msgText});
    document.getElementById('msgInput').value="";
}
</script>
</body>
</html>
